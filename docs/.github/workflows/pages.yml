name: Deploy Jekyll site from /docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # Theme-only Jekyll build (no Gemfile needed)
      - name: Build with GitHub Pages Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      # OPTIONAL: only if you created docs/raw/SKILL.md
      - name: Copy raw markdown endpoints
        run: |
          if [ -f "./docs/raw/SKILL.md" ]; then
            cp ./docs/raw/SKILL.md ./_site/SKILL.md
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4